<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş RPG Karakter Yaratım Motoru</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #121212; color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { margin-bottom: 5px; color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.5); text-align: center; font-size: 22px; }
        
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 650px; }
        
        /* Aşama Paneli */
        .status-panel { background: #1e1e1e; border: 1px solid #ffcc00; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; color: #ddd; font-size: 14px; text-align: center; }
        .step-highlight { color: #ff3333; font-size: 16px; text-transform: uppercase; }

        /* Çark Alanı */
        .wheel-container { position: relative; width: 320px; height: 320px; margin: 10px 0; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ff3333; z-index: 10; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        canvas { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 5px #ffcc00; transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1); }
        
        /* Butonlar */
        .controls { width: 100%; }
        button { padding: 15px; border-radius: 6px; border: 2px solid #ffcc00; background: #2a2a2a; color: #ffcc00; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: all 0.3s; text-transform: uppercase; }
        button:hover { background: #ffcc00; color: #1a1a1a; }
        button:disabled { background: #444; color: #888; border-color: #555; cursor: not-allowed; }

        /* Not Defteri */
        .notebook-wrapper { position: relative; width: 100%; margin-top: 10px; }
        .notebook-header { display: flex; justify-content: space-between; align-items: center; color: #ffcc00; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .notebook { background: #f4ebd0; color: #2b261d; width: 100%; padding: 20px 20px 20px 45px; border-radius: 4px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); border-left: 5px solid #b5a47e; min-height: 250px; font-size: 14px; font-weight: bold; line-height: 1.6; resize: vertical; overflow-y: auto; border-top: none; border-right: none; border-bottom: none; }
        .red-line { position: absolute; top: 25px; bottom: 0; left: 35px; width: 1px; background: #ff9999; pointer-events: none; }
        .btn-clear { background: #ff3333; color: white; border: none; padding: 6px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; }
        
    </style>
</head>
<body>

    <h1>Karakter Yaratım Çarkı</h1>

    <div class="container">
        <!-- Aşama Bilgisi -->
        <div class="status-panel">
            Mevcut Aşama:<br>
            <span id="stepDisplay" class="step-highlight">1. Birinci Mitoloji Seçimi</span>
            <div id="subText" style="font-size: 11px; color:#aaa; margin-top:5px;">Sistem sıradaki çarkı otomatik olarak hazırlar.</div>
        </div>

        <!-- Çark Görseli -->
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>

        <div class="controls">
            <button id="spinBtn" onclick="spinWheel()">ÇARKI ÇEVİR</button>
        </div>

        <!-- Not Defteri -->
        <div class="notebook-wrapper">
            <div class="notebook-header">
                <span>📜 Karakter & Macera Defteri</span>
                <button class="btn-clear" onclick="resetProcess()">Sistemi Sıfırla</button>
            </div>
            <div class="red-line"></div>
            <textarea id="notebookArea" class="notebook" placeholder="Sonuçlar buraya akar..."></textarea>
        </div>
    </div>

    <script>
        /* ========================================================================
           VERİ TABANI & OLASILIK AYARLARI (İstediğin gibi değiştirebilirsin)
           - name: Ekranda ve defterde görünecek isim.
           - weight: Çıkma olasılığı. Sayı ne kadar büyükse, dilim o kadar geniş olur!
           ======================================================================== */
        const DB = {
            mitolojiler: [
                { name: "Yunan Mitolojisi", weight: 30 },
                { name: "İskandinav Mit.", weight: 30 },
                { name: "Mısır Mitolojisi", weight: 20 },
                { name: "Japon (Yokai)", weight: 20 }
            ],
            canavarlar: {
                "Yunan Mitolojisi": [
                    { name: "Minotor", weight: 10 }, { name: "Medusa", weight: 10 }, { name: "Kerberos", weight: 5 }, { name: "Kimera", weight: 5 }
                ],
                "İskandinav Mit.": [
                    { name: "Fenrir", weight: 10 }, { name: "Jörmungandr", weight: 8 }, { name: "Trol", weight: 15 }, { name: "Draugr", weight: 15 }
                ],
                "Mısır Mitolojisi": [
                    { name: "Anubis Ruhu", weight: 10 }, { name: "Sfenks", weight: 10 }, { name: "Apep (Yılan)", weight: 5 }
                ],
                "Japon (Yokai)": [
                    { name: "Oni", weight: 15 }, { name: "Kitsune", weight: 10 }, { name: "Tengu", weight: 10 }, { name: "Kappa", weight: 5 }
                ]
            },
            yetenekler: { // Her canavara özel yetenek havuzu
                "Minotor": [{name: "Sarsılmaz Güç", weight: 10}, {name: "Labirent Görüşü", weight: 10}, {name: "Öfke Patlaması", weight: 5}],
                "Medusa": [{name: "Taşa Çevirme", weight: 5}, {name: "Yılan Zehri", weight: 10}, {name: "Çeviklik", weight: 15}],
                "Fenrir": [{name: "Zincir Kırıcı", weight: 5}, {name: "Devasa Çene", weight: 10}, {name: "Korku Uluması", weight: 10}],
                "Varsayilan": [{name: "Pençe Darbesi", weight: 10}, {name: "Hızlı İyileşme", weight: 10}, {name: "Gece Görüşü", weight: 10}, {name: "Deri Zırh", weight: 10}] // Özel yetenek yazmadıkların için kullanılır
            },
            yuzdeler: [
                { name: "%100 (Safkan)", val: 100, weight: 10 }, // Safkan çıkma ihtimali daha düşük
                { name: "%80", val: 80, weight: 30 },
                { name: "%60", val: 60, weight: 30 },
                { name: "%50", val: 50, weight: 30 }
            ],
            yetenekSayisi: [
                { name: "1 Yetenek", val: 1, weight: 40 },
                { name: "2 Yetenek", val: 2, weight: 30 },
                { name: "3 Yetenek", val: 3, weight: 20 },
                { name: "4 Yetenek", val: 4, weight: 10 }
            ],
            cinsiyetler: [
                { name: "Erkek", weight: 40 }, { name: "Kadın", weight: 40 }, { name: "Şekil Değiştiren", weight: 10 }, { name: "Cinsiyetsiz", weight: 10 }
            ],
            zihinselGuc: [
                { name: "Düşük (Vahşi)", weight: 20 }, { name: "Ortalama", weight: 40 }, { name: "Yüksek", weight: 25 }, { name: "Dahi/Kozmik", weight: 15 }
            ]
        };

        const colors = ["#ff4136", "#2ecc40", "#0074d9", "#ffdc00", "#b10dc9", "#ff851b", "#01ff70", "#7fdbff", "#f012be", "#3d9970"];
        
        // Karakterin tüm verilerini tutan obje
        let charData = {
            mit1: "", canavar1: "", yuzde1: 0,
            mit2: "", canavar2: "", yuzde2: 0,
            yCount1: 0, yetenekler1: [],
            yCount2: 0, yetenekler2: [],
            cinsiyet: "", zihin: ""
        };

        // Sistem Aşamaları (Steps)
        let step = 1; 
        let spinsLeftForAbilities = 0; // Çoklu yetenek çevirme için sayaç
        let currentOptions = []; // O an çarkta olan dilimler
        let isSpinning = false;
        let currentRotation = 0; // Çarkın fiziksel açısı

        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const notebookArea = document.getElementById("notebookArea");

        // Sayfa yüklendiğinde başlat
        initStep();

        // Çark dilimlerini oluşturan ve çizen fonksiyon (AĞIRLIKLI OLASILIK SİSTEMİ)
        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Toplam ağırlığı (olasılığı) hesapla
            let totalWeight = currentOptions.reduce((sum, opt) => sum + opt.weight, 0);
            let currentAngle = 0;

            for (let i = 0; i < currentOptions.length; i++) {
                let opt = currentOptions[i];
                // Bu dilimin kaplayacağı açı = (Kendi ağırlığı / Toplam Ağırlık) * 360 derece
                let sliceAngle = (opt.weight / totalWeight) * 2 * Math.PI;
                
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, currentAngle, currentAngle + sliceAngle);
                ctx.lineTo(250, 250);
                ctx.fill();
                ctx.stroke();

                // Yazı yazdırma ayarları
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(currentAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                
                let fontSize = currentOptions.length > 8 ? "12px" : "15px";
                ctx.font = `bold ${fontSize} Courier New`;
                
                let text = opt.name;
                if(text.length > 22) text = text.substring(0,20) + "..";
                ctx.fillText(text, 230, 5);
                ctx.restore();

                currentAngle += sliceAngle;
            }

            // Merkez noktası
            ctx.beginPath();
            ctx.arc(250, 250, 25, 0, 2 * Math.PI);
            ctx.fillStyle = "#1a1a1a";
            ctx.fill();
            ctx.strokeStyle = "#ffcc00";
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // Aşamayı ayarla ve çarka verileri yükle
        function initStep() {
            let stepTitle = "";
            let subTitle = "";

            if (step === 1) {
                stepTitle = "1. Aşama: 1. Mitoloji";
                currentOptions = DB.mitolojiler;
            } else if (step === 2) {
                stepTitle = `2. Aşama: ${charData.mit1} Canavarı`;
                currentOptions = DB.canavarlar[charData.mit1] || DB.canavarlar["Yunan Mitolojisi"]; // Hata önleyici
            } else if (step === 3) {
                stepTitle = "3. Aşama: Ruh Yüzdesi";
                currentOptions = DB.yuzdeler;
            } else if (step === 4) {
                stepTitle = "4. Aşama: 2. Mitoloji (Kalan Yüzde İçin)";
                subTitle = `1. Ruhu %${charData.yuzde1} çıktı. Kalan %${charData.yuzde2} için mitoloji seçiliyor.`;
                currentOptions = DB.mitolojiler;
            } else if (step === 5) {
                stepTitle = `5. Aşama: ${charData.mit2} Canavarı`;
                currentOptions = DB.canavarlar[charData.mit2];
            } else if (step === 6) {
                stepTitle = `6. Aşama: 1. Ruh Yetenek Sayısı`;
                subTitle = `${charData.canavar1} ruhu için kaç yeteneğin olacak?`;
                currentOptions = DB.yetenekSayisi;
            } else if (step === 7) {
                stepTitle = `7. Aşama: 1. Ruh Yetenekleri (${spinsLeftForAbilities} Çevirme Kaldı)`;
                // Eğer o canavara özel yetenek yoksa "Varsayılan" havuzu kullanır
                currentOptions = DB.yetenekler[charData.canavar1] || DB.yetenekler["Varsayilan"];
            } else if (step === 8) {
                stepTitle = `8. Aşama: 2. Ruh Yetenek Sayısı`;
                subTitle = `${charData.canavar2} ruhu için kaç yeteneğin olacak?`;
                currentOptions = DB.yetenekSayisi;
            } else if (step === 9) {
                stepTitle = `9. Aşama: 2. Ruh Yetenekleri (${spinsLeftForAbilities} Çevirme Kaldı)`;
                currentOptions = DB.yetenekler[charData.canavar2] || DB.yetenekler["Varsayilan"];
            } else if (step === 10) {
                stepTitle = "10. Aşama: Cinsiyet";
                currentOptions = DB.cinsiyetler;
            } else if (step === 11) {
                stepTitle = "11. Aşama: Zihinsel Güç Seviyesi";
                currentOptions = DB.zihinselGuc;
            } else if (step === 12) {
                stepTitle = "KARAKTER YARATIMI TAMAMLANDI!";
                subTitle = "Tüm özellikleri Defter'de görebilirsin.";
                currentOptions = [{name: "Sıfırlamak için butona bas", weight: 1}];
                document.getElementById("spinBtn").disabled = true;
                printFinalCharacterSheet();
            }

            document.getElementById("stepDisplay").innerText = stepTitle;
            document.getElementById("subText").innerText = subTitle;
            drawWheel();
        }

        function spinWheel() {
            if (isSpinning || step > 11) return;
            isSpinning = true;
            document.getElementById("spinBtn").disabled = true;

            // Rastgele bir fiziksel dönüş (En az 5 tur = 1800 derece)
            const randomDegrees = Math.floor(Math.random() * 360) + 1800; 
            currentRotation += randomDegrees;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                document.getElementById("spinBtn").disabled = false;

                // AĞIRLIKLI OLASILIK HESAPLAMASI İLE KAZANANI BULMA
                // Fiziksel çark dönüş açısını al ve İbre'nin (Yukarıda, yani 270. derecede) nereye denk geldiğini bul
                const actualDegrees = currentRotation % 360;
                // Matematiksel olarak ibrenin gösterdiği açıyı radyan cinsine çevirme
                let pointerAngle = (270 - actualDegrees + 360) % 360;
                let pointerRad = pointerAngle * (Math.PI / 180);

                let totalWeight = currentOptions.reduce((sum, opt) => sum + opt.weight, 0);
                let currentRad = 0;
                let winningOption = currentOptions[0];

                for (let i = 0; i < currentOptions.length; i++) {
                    let sliceRad = (currentOptions[i].weight / totalWeight) * 2 * Math.PI;
                    if (pointerRad >= currentRad && pointerRad < currentRad + sliceRad) {
                        winningOption = currentOptions[i];
                        break;
                    }
                    currentRad += sliceRad;
                }

                processResult(winningOption);

            }, 4000);
        }

        // Çıkan sonuca göre veriyi kaydet ve bir sonraki aşamaya karar ver
        function processResult(result) {
            let logMsg = "";

            if (step === 1) {
                charData.mit1 = result.name;
                logMsg = `1. Mitoloji: ${result.name} seçildi.`;
                step = 2;
            } 
            else if (step === 2) {
                charData.canavar1 = result.name;
                logMsg = `1. Ruh: ${result.name} (${charData.mit1}) uyandı!`;
                step = 3;
            } 
            else if (step === 3) {
                charData.yuzde1 = result.val;
                if (charData.yuzde1 === 100) {
                    logMsg = `Ruh Yüzdesi: %100 SAFKAN! (2. Ruh atlanıyor)`;
                    charData.yuzde2 = 0;
                    step = 6; // 4 ve 5. adımları atla
                } else {
                    charData.yuzde2 = 100 - charData.yuzde1;
                    logMsg = `Ruh Yüzdesi: %${charData.yuzde1} İlk Ruh. Geriye kalan %${charData.yuzde2} hesaplanıyor...`;
                    step = 4;
                }
            } 
            else if (step === 4) {
                charData.mit2 = result.name;
                logMsg = `2. Mitoloji (%${charData.yuzde2} dilim için): ${result.name} seçildi.`;
                step = 5;
            } 
            else if (step === 5) {
                charData.canavar2 = result.name;
                logMsg = `2. Ruh: ${result.name} (%${charData.yuzde2}) uyandı!`;
                step = 6;
            } 
            else if (step === 6) {
                charData.yCount1 = result.val;
                spinsLeftForAbilities = result.val;
                logMsg = `1. Ruh Yetenek Sayısı: ${result.val} adet.`;
                step = 7;
            } 
            else if (step === 7) {
                charData.yetenekler1.push(result.name);
                spinsLeftForAbilities--;
                logMsg = `Kazanılan Yetenek: ${result.name} (${charData.canavar1})`;
                
                if (spinsLeftForAbilities <= 0) {
                    if (charData.yuzde1 === 100) step = 10; // Safkansa 2. yetenekleri atla
                    else step = 8;
                }
            } 
            else if (step === 8) {
                charData.yCount2 = result.val;
                spinsLeftForAbilities = result.val;
                logMsg = `2. Ruh Yetenek Sayısı: ${result.val} adet.`;
                step = 9;
            } 
            else if (step === 9) {
                charData.yetenekler2.push(result.name);
                spinsLeftForAbilities--;
                logMsg = `Kazanılan Yetenek: ${result.name} (${charData.canavar2})`;
                
                if (spinsLeftForAbilities <= 0) step = 10;
            } 
            else if (step === 10) {
                charData.cinsiyet = result.name;
                logMsg = `Cinsiyet: ${result.name} olarak belirlendi.`;
                step = 11;
            } 
            else if (step === 11) {
                charData.zihin = result.name;
                logMsg = `Zihinsel Güç: ${result.name} olarak mühürlendi.`;
                step = 12; // Bitiş
            }

            writeToNotebook(logMsg);
            initStep();
        }

        // Deftere Satır Ekleme
        function writeToNotebook(msg) {
            const timeStr = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            notebookArea.value = `[${timeStr}] ${msg}\n` + notebookArea.value;
        }

        // Her şey bitince karakter özetini deftere bas
        function printFinalCharacterSheet() {
            let sheet = `\n==================================\n`;
            sheet += `      🔥 KARAKTER PROFİLİ 🔥\n`;
            sheet += `==================================\n`;
            sheet += `👤 Cinsiyet: ${charData.cinsiyet}\n`;
            sheet += `🧠 Zihin Seviyesi: ${charData.zihin}\n\n`;
            
            sheet += `🩸 BİRİNCİ RUH (%${charData.yuzde1})\n`;
            sheet += `   Mitoloji: ${charData.mit1}\n`;
            sheet += `   Canavar: ${charData.canavar1}\n`;
            sheet += `   Yetenekler: ${charData.yetenekler1.join(", ")}\n\n`;

            if (charData.yuzde2 > 0) {
                sheet += `🩸 İKİNCİ RUH (%${charData.yuzde2})\n`;
                sheet += `   Mitoloji: ${charData.mit2}\n`;
                sheet += `   Canavar: ${charData.canavar2}\n`;
                sheet += `   Yetenekler: ${charData.yetenekler2.join(", ")}\n`;
            } else {
                sheet += `🩸 İKİNCİ RUH: Yok (Safkan Kan Hattı)\n`;
            }
            sheet += `==================================\n`;

            notebookArea.value = sheet + notebookArea.value;
        }

        // Sistemi En Başa Sar
        function resetProcess() {
            if(confirm("Tüm karakter yaratım sürecini sıfırlamak istiyor musun?")) {
                charData = { mit1: "", canavar1: "", yuzde1: 0, mit2: "", canavar2: "", yuzde2: 0, yCount1: 0, yetenekler1: [], yCount2: 0, yetenekler2: [], cinsiyet: "", zihin: "" };
                step = 1;
                spinsLeftForAbilities = 0;
                notebookArea.value = "";
                currentRotation = 0;
                document.getElementById("spinBtn").disabled = false;
                initStep();
                writeToNotebook("Sistem sıfırlandı. Yeni bir karakter için kader çarkı hazır.");
            }
        }
    </script>
</body>
</html>
