<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Monster Soul Character Generator v5.1</title>
    <style>
        body { background: #121212; color: #eee; font-family: 'Courier New', Courier, monospace; display: flex; padding: 20px; margin: 0; }
        .left-panel { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .right-panel { width: 400px; background: #1e1e1e; padding: 20px; border-left: 2px solid #333; height: 95vh; overflow-y: auto; display: flex; flex-direction: column; }
        
        h2 { color: #ffcc00; text-align: center; height: 60px; }
        .wheel-container { position: relative; width: 400px; height: 400px; margin-bottom: 20px; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ff3333; z-index: 10; }
        canvas { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.8); transition: transform 3.5s cubic-bezier(0.15, 0.85, 0.35, 1); }
        
        .main-btn { padding: 12px 24px; font-size: 18px; font-weight: bold; background: #ffcc00; color: #111; border: none; cursor: pointer; border-radius: 5px; transition: 0.2s; width: 300px; text-transform: uppercase; }
        .main-btn:hover { background: #e6b800; }
        .main-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        
        #newCharBtn { background: #4CAF50; color: white; display: none; }
        #newCharBtn:hover { background: #45a049; }

        .dev-panel { margin-top: 20px; padding: 15px; background: #2a2a2a; border-radius: 8px; width: 100%; max-width: 500px; border: 1px solid #444; }
        .dev-panel input, .dev-panel select { width: 100%; padding: 8px; margin-bottom: 10px; background: #111; color: #fff; border: 1px solid #555; box-sizing: border-box; }
        .dev-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .dev-row label { font-size: 11px; color: #aaa; width: 100%; display: block; }
        .dev-row button { flex: 1; font-size: 13px; padding: 8px; cursor: pointer; border: none; border-radius: 3px; font-weight: bold; }
        
        .history-select { width: 100%; padding: 10px; background: #111; color: #ffcc00; border: 1px solid #555; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        .char-name-input { width: 100%; padding: 12px; background: #222; color: #fff; border: 1px solid #ffcc00; font-size: 18px; font-weight: bold; margin-bottom: 10px; box-sizing: border-box; text-align: center; }
        
        .notebook { background: #f4ebd0; color: #2b261d; padding: 15px; border-radius: 5px; flex: 1; font-weight: bold; white-space: pre-wrap; font-family: sans-serif; overflow-y: auto; outline: none; border: 2px solid transparent; transition: 0.3s; }
        .notebook:focus { border: 2px solid #ff3333; background: #fff; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="left-panel">
    <h2 id="stepTitle">Hazırlanıyor...</h2>
    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>
    
    <button id="spinBtn" class="main-btn" onclick="spin()">ÇARK'I ÇEVİR</button>
    <button id="newCharBtn" class="main-btn" onclick="startNewCharacter()">✨ Yeni Karakter Yarat</button>

    <div class="dev-panel">
        <h3 style="margin-top:0; color:#00ffcc;">⚙️ Geliştirici Gelişmiş Yönetim Paneli</h3>
        <select id="catSelect" onchange="updateDevUI()"></select>
        
        <div class="dev-row">
            <div>
                <label>Seçenek Adı (Aynıysa Günceller)</label>
                <input type="text" id="optName" placeholder="Seçenek Adı">
            </div>
        </div>
        <div class="dev-row">
            <div>
                <label>Yüzde İhtimali</label>
                <input type="number" id="optProb" placeholder="İhtimal (Örn: 40)">
            </div>
            <div>
                <label>Max Çıkma Limiti</label>
                <input type="number" id="optLimit" placeholder="Limit (Örn: 2)">
            </div>
            <div>
                <label>Mevcut Çıkma Sayısı</label>
                <input type="number" id="optCount" placeholder="Çıkma Sayısı (Örn: 0)">
            </div>
        </div>
        
        <div class="dev-row" style="margin-top: 10px;">
            <button onclick="addOption()" style="background: #4CAF50; color:white;">Ekle / Güncelle</button>
            <button onclick="deleteOption()" style="background: #f44336; color:white;">Seçiliyi Sil</button>
        </div>
    </div>
</div>

<div class="right-panel">
    <h3 style="color: #ffcc00; margin-top: 0; text-align:center;">📜 Karakter Arşivi</h3>
    
    <select id="historySelect" class="history-select" onchange="viewHistory()">
        <option value="current">▶ Mevcut Karakter (Oluşturuluyor)</option>
    </select>
    
    <input type="text" id="charName" class="char-name-input" placeholder="Karaktere İsim Ver..." oninput="handleNameEdit()">
    
    <div id="notebook" class="notebook" contenteditable="true" oninput="handleNotebookEdit()"></div>
</div>

<script>
    // Yaş çarkı en sona eklendi
    const flow = [
        "1. Canavar Ruhu", 
        "İlk Canavar Yüzdesi", 
        "2. Canavar Ruhu", 
        "Yetenek Sayısı", 
        "Zihin Gücü", 
        "Güç", 
        "Dayanıklılık", 
        "Zeka", 
        "Hız", 
        "Fiziksel Benzeme Yüzdesi", 
        "Fiziksel Değişimler", 
        "Göz Rengi", 
        "Saç Rengi", 
        "Boy", 
        "Kilo", 
        "Karakter Sınıfı/Kişilik", 
        "Ülke", 
        "Ülkedeki Konumu",
        "Yaş"
    ];

    let DB = JSON.parse(localStorage.getItem("masterMonsterDB")) || {};
    let charHistory = JSON.parse(localStorage.getItem("masterMonsterHistory")) || [];
    
    // Varsayılan veritabanı kurulumu
    flow.forEach(step => {
        if (!DB[step]) {
            DB[step] = {
                colorBase: { r: Math.floor(Math.random()*120), g: Math.floor(Math.random()*120), b: Math.floor(Math.random()*120) },
                options: [
                    { name: "Seçenek A", prob: 50, limit: 1, count: 0 },
                    { name: "Seçenek B", prob: 50, limit: 1, count: 0 }
                ]
            };
            if(step === "İlk Canavar Yüzdesi") DB[step].options = [{name: "%100", prob: 20, limit: 99, count:0}, {name: "%70", prob: 40, limit: 99, count:0}, {name: "%50", prob: 40, limit: 99, count:0}];
            if(step === "Fiziksel Benzeme Yüzdesi") DB[step].options = [{name: "%100", prob: 10, limit: 99, count:0}, {name: "%30", prob: 40, limit: 99, count:0}, {name: "%10", prob: 50, limit: 99, count:0}];
            if(step === "Yetenek Sayısı") DB[step].options = [{name: "1", prob: 60, limit: 99, count:0}, {name: "3", prob: 40, limit: 99, count:0}];
            if(step === "Yaş") DB[step].options = [{name: "18-25", prob: 40, limit: 99, count:0}, {name: "26-40", prob: 40, limit: 99, count:0}, {name: "40+", prob: 20, limit: 99, count:0}];
        }
    });

    let state = {
        stepIdx: 0,
        rotation: 0,
        spinsLeft: 1, 
        vars: { ilkYuzde: 0, benzemeYuzdesi: 0 },
        draftLog: "",
        charName: ""
    };

    function sortOptions(stepName) { DB[stepName].options.sort((a, b) => b.prob - a.prob); }

    function drawWheel() {
        const stepName = flow[state.stepIdx];
        sortOptions(stepName);
        const data = DB[stepName];
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, 500, 500);

        const totalProb = data.options.reduce((sum, opt) => sum + opt.prob, 0);
        let startAngle = 0;

        data.options.forEach((opt, i) => {
            const sliceAngle = (opt.prob / totalProb) * 2 * Math.PI;
            const shade = i * (140 / data.options.length);
            const r = Math.min(255, data.colorBase.r + shade);
            const g = Math.min(255, data.colorBase.g + shade);
            const b = Math.min(255, data.colorBase.b + shade);
            
            const isExhausted = opt.count >= opt.limit;
            ctx.fillStyle = isExhausted ? "#3a3a3a" : `rgb(${r},${g},${b})`;

            ctx.beginPath();
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, startAngle, startAngle + sliceAngle);
            ctx.fill();
            ctx.strokeStyle = "#111";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(startAngle + sliceAngle / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = isExhausted ? "#666" : "#fff";
            ctx.font = "bold 18px Courier New";
            ctx.fillText(opt.name, 230, 6);
            ctx.restore();

            opt.startAngle = startAngle;
            opt.endAngle = startAngle + sliceAngle;
            startAngle += sliceAngle;
        });
    }

    function spin() {
        const stepName = flow[state.stepIdx];
        const data = DB[stepName];
        const validOptions = data.options.filter(o => o.count < o.limit);
        
        if(validOptions.length === 0) return alert("Bu çarktaki tüm seçeneklerin limiti dolmuş durumda!");

        document.getElementById("spinBtn").disabled = true;

        const validTotalWeight = validOptions.reduce((sum, opt) => sum + opt.prob, 0);
        let randomWeight = Math.random() * validTotalWeight;
        let winner = null;

        for (let opt of validOptions) {
            randomWeight -= opt.prob;
            if (randomWeight <= 0) { winner = opt; break; }
        }

        const winnerMidAngle = winner.startAngle + (winner.endAngle - winner.startAngle) / 2;
        const targetRotation = (270 * Math.PI / 180) - winnerMidAngle;
        state.rotation += (Math.PI * 2 * (5 + Math.floor(Math.random() * 5))); 
        
        document.getElementById("wheel").style.transform = `rotate(${state.rotation + targetRotation}rad)`;

        setTimeout(() => {
            winner.count++; 
            saveDB();
            processResult(winner.name, stepName);
        }, 3500);
    }

    function processResult(result, stepName) {
        logToNotebook(stepName, result);
        
        const getNum = (str) => {
            const match = String(str).match(/\d+/);
            return match ? parseInt(match[0]) : 0;
        };
        
        if (stepName === "İlk Canavar Yüzdesi") state.vars.ilkYuzde = getNum(result);
        
        if (stepName === "Yetenek Sayısı") {
            let num = getNum(result);
            state.spinsLeft = num > 0 ? num : 1;
        }

        if (stepName === "Fiziksel Benzeme Yüzdesi") {
            state.vars.benzemeYuzdesi = getNum(result);
            if(state.vars.benzemeYuzdesi === 100) {
                state.spinsLeft = 0; 
            } else {
                state.spinsLeft = Math.floor(state.vars.benzemeYuzdesi / 10);
                if(state.spinsLeft <= 0) state.spinsLeft = 1; 
            }
        }

        if (stepName === "Fiziksel Değişimler" && state.spinsLeft > 1) {
            state.spinsLeft--;
            document.getElementById("stepTitle").innerText = `${stepName} (Kalan Seçim: ${state.spinsLeft})`;
            document.getElementById("spinBtn").disabled = false;
            drawWheel();
            return;
        }

        state.spinsLeft = 1; 
        determineNextStep();
    }

    function determineNextStep() {
        state.stepIdx++;
        
        if (state.stepIdx >= flow.length) {
            document.getElementById("stepTitle").innerText = "🎉 Karakter Kaydedildi!";
            document.getElementById("spinBtn").style.display = "none";
            document.getElementById("newCharBtn").style.display = "block";
            
            if(state.draftLog.trim() !== "") {
                const dateStr = new Date().toLocaleString('tr-TR');
                const finalName = state.charName.trim() !== "" ? state.charName : "Yeni Canavar Melezi";
                charHistory.push({ name: finalName, date: dateStr, log: state.draftLog });
                saveHistory();
                updateHistoryDropdown();
                document.getElementById("historySelect").value = charHistory.length - 1;
                viewHistory(); 
            }
            return;
        }

        const next = flow[state.stepIdx];
        let skip = false;
        
        if (next === "2. Canavar Ruhu" && state.vars.ilkYuzde === 100) skip = true;
        if (next === "Fiziksel Değişimler" && state.vars.benzemeYuzdesi === 100) skip = true;

        if (skip) determineNextStep(); 
        else initStep();
    }

    function initStep() {
        const stepName = flow[state.stepIdx];
        let titleText = stepName;
        
        if (stepName === "Fiziksel Değişimler" && state.spinsLeft > 1) {
            titleText = `${stepName} (Kalan Değişim: ${state.spinsLeft})`;
        }
        
        document.getElementById("stepTitle").innerText = titleText;
        document.getElementById("spinBtn").disabled = false;
        document.getElementById("catSelect").value = stepName;
        updateDevUI();
        drawWheel();
    }

    function initDevPanel() {
        const select = document.getElementById("catSelect");
        flow.forEach(step => {
            const opt = document.createElement("option");
            opt.value = step;
            opt.innerText = step;
            select.appendChild(opt);
        });
    }

    function updateDevUI() {
        document.getElementById("optName").value = "";
        document.getElementById("optProb").value = "";
        document.getElementById("optLimit").value = "";
        document.getElementById("optCount").value = ""; 
    }

    function addOption() {
        const stepName = document.getElementById("catSelect").value;
        const name = document.getElementById("optName").value;
        const prob = parseInt(document.getElementById("optProb").value) || 10;
        const limit = parseInt(document.getElementById("optLimit").value) || 1;
        const count = parseInt(document.getElementById("optCount").value) || 0; 

        if(!name) return alert("Lütfen bir seçenek adı belirtin!");

        const existing = DB[stepName].options.find(o => o.name === name);
        if(existing) {
            existing.prob = prob;
            existing.limit = limit;
            existing.count = count; 
        } else {
            DB[stepName].options.push({ name, prob, limit, count: count });
        }
        
        saveDB();
        if(stepName === flow[state.stepIdx]) drawWheel();
        alert("Çark seçeneği güncellendi/eklendi!");
    }

    function deleteOption() {
        const stepName = document.getElementById("catSelect").value;
        const name = document.getElementById("optName").value;
        DB[stepName].options = DB[stepName].options.filter(o => o.name !== name);
        saveDB();
        if(stepName === flow[state.stepIdx]) drawWheel();
        alert("Seçenek silindi.");
    }

    function handleNameEdit() {
        const val = document.getElementById("historySelect").value;
        const newName = document.getElementById("charName").value;
        if(val === "current") state.charName = newName;
        else { charHistory[val].name = newName; saveHistory(); updateHistoryDropdown(); document.getElementById("historySelect").value = val; }
    }

    function handleNotebookEdit() {
        const val = document.getElementById("historySelect").value;
        const newLog = document.getElementById("notebook").innerHTML;
        if(val === "current") state.draftLog = newLog;
        else { charHistory[val].log = newLog; saveHistory(); }
    }

    function saveHistory() { localStorage.setItem("masterMonsterHistory", JSON.stringify(charHistory)); }
    function saveDB() { localStorage.setItem("masterMonsterDB", JSON.stringify(DB)); }

    function startNewCharacter() {
        state.stepIdx = 0; state.rotation = 0; state.spinsLeft = 1;
        state.vars = { ilkYuzde: 0, benzemeYuzdesi: 0 };
        state.draftLog = ""; state.charName = "";
        
        document.getElementById("historySelect").value = "current";
        document.getElementById("charName").value = "";
        document.getElementById("notebook").innerHTML = "";
        document.getElementById("spinBtn").style.display = "block";
        document.getElementById("newCharBtn").style.display = "none";
        initStep();
    }

    function logToNotebook(category, result) {
        state.draftLog += `<div class="log-entry"><b>${category}:</b> ${result}</div>`;
        if(document.getElementById("historySelect").value === "current") {
            const nb = document.getElementById("notebook");
            nb.innerHTML = state.draftLog;
            nb.scrollTop = nb.scrollHeight;
        }
    }

    function updateHistoryDropdown() {
        const select = document.getElementById("historySelect");
        select.innerHTML = '<option value="current">▶ Mevcut Karakter (Oluşturuluyor)</option>';
        charHistory.forEach((char, index) => {
            const opt = document.createElement("option");
            opt.value = index;
            const displayName = char.name && char.name.trim() !== "" ? char.name : `Karakter #${index + 1}`;
            opt.innerText = `${displayName} - ${char.date}`;
            select.appendChild(opt);
        });
    }

    function viewHistory() {
        const val = document.getElementById("historySelect").value;
        const nb = document.getElementById("notebook");
        const nameInput = document.getElementById("charName");
        
        if(val === "current") { nb.innerHTML = state.draftLog; nameInput.value = state.charName; } 
        else { nb.innerHTML = charHistory[val].log; nameInput.value = charHistory[val].name || ""; }
        nb.scrollTop = nb.scrollHeight;
    }

    initDevPanel();
    updateHistoryDropdown();
    initStep();

</script>
</body>
</html>
