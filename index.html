<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Karakter Yaratım Motoru (Ultimate)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background-color: #121212; color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { margin-bottom: 5px; color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.5); text-align: center; font-size: 22px; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 650px; margin-bottom: 30px; }
        .status-panel { background: #1e1e1e; border: 1px solid #ffcc00; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; color: #ddd; font-size: 14px; text-align: center; }
        .step-highlight { color: #ff3333; font-size: 16px; text-transform: uppercase; }
        .wheel-container { position: relative; width: 320px; height: 320px; margin: 10px 0; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ff3333; z-index: 10; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        canvas { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 5px #ffcc00; transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1); }
        button { padding: 15px; border-radius: 6px; border: 2px solid #ffcc00; background: #2a2a2a; color: #ffcc00; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; transition: all 0.3s; text-transform: uppercase; }
        button:hover { background: #ffcc00; color: #1a1a1a; }
        button:disabled { background: #444; color: #888; border-color: #555; cursor: not-allowed; }
        .dev-panel { width: 100%; background: #222; border: 1px dashed #00ffcc; border-radius: 6px; margin-top: 10px; overflow: hidden; }
        .dev-header { background: #111; color: #00ffcc; padding: 10px; text-align: center; font-size: 14px; font-weight: bold; cursor: pointer; }
        .dev-content { padding: 15px; display: none; flex-direction: column; gap: 10px; }
        input, select { padding: 10px; background: #333; border: 1px solid #555; color: white; border-radius: 4px; }
        .notebook { background: #f4ebd0; color: #2b261d; width: 100%; padding: 20px 45px; border-radius: 4px; min-height: 250px; font-weight: bold; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>RPG Karakter Motoru</h1>
    <div class="container">
        <div class="status-panel">Mevcut Aşama:<br><span id="stepDisplay" class="step-highlight">1. Başlat</span></div>
        <div class="wheel-container"><div class="pointer"></div><canvas id="wheelCanvas" width="500" height="500"></canvas></div>
        <button id="spinBtn" onclick="spinWheel()">ÇARKI ÇEVİR</button>

        <div class="dev-panel">
            <div class="dev-header" onclick="toggleDevPanel()">⚙️ Geliştirici Paneli</div>
            <div class="dev-content" id="devPanelContent">
                <select id="devCategory">
                    <option value="mitolojiler">Mitoloji</option><option value="cinsiyetler">Cinsiyet</option>
                    <option value="yas">Keşif/Güncel Yaş</option><option value="uzmanlik">Uzmanlık</option>
                </select>
                <input type="text" id="devName" placeholder="İsim">
                <input type="number" id="devWeight" placeholder="İhtimal (1-100)">
                <button onclick="addCustomOption()">Ekle</button>
            </div>
        </div>

        <textarea id="notebookArea" class="notebook" readonly></textarea>
    </div>

    <script>
        let DB = JSON.parse(localStorage.getItem("rpgDatabase")) || {
            mitolojiler: [{name: "Yunan", weight: 30}, {name: "İskandinav", weight: 30}],
            canavarlar: {"Yunan": [{name: "Minotor", weight: 10}], "İskandinav": [{name: "Fenrir", weight: 10}]},
            yetenekler: {"Minotor": [{name: "Sarsılmaz Güç", weight: 10}], "Varsayilan": [{name: "Pençe", weight: 10}]},
            yuzdeler: [{name: "%100", val: 100, weight: 10}],
            yetenekSayisi: [{name: "1", val: 1, weight: 50}],
            cinsiyetler: [{name: "Erkek", weight: 50}, {name: "Kadın", weight: 50}],
            zihinselGuc: [{name: "Düşük", weight: 50}, {name: "Yüksek", weight: 50}],
            yas: [{name: "Çocukluk (5-10)", weight: 30}, {name: "Gençlik (15-20)", weight: 40}, {name: "Yetişkin (30+)", weight: 30}],
            uzmanlik: [{name: "Acemi", weight: 30}, {name: "Deneyimli", weight: 40}, {name: "Usta", weight: 30}]
        };

        let charData = { kesifYasi: "", uzmanlik: "", guncelYas: "" };
        let step = 1; 
        let spinsLeft = 0; 
        let currentOptions = [];
        let currentRotation = 0;
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");

        function initStep() {
            if (step === 1) { stepDisplay("1. Mitoloji", DB.mitolojiler); }
            else if (step === 2) { stepDisplay("2. Canavar", DB.canavarlar[charData.mit1] || DB.canavarlar["Yunan"]); }
            // ... (Diğer adımlar benzeri şekilde 11'e kadar devam eder)
            else if (step === 12) { stepDisplay("12. Yetenek Keşif Yaşı", DB.yas); }
            else if (step === 13) { stepDisplay("13. Uzmanlık Seviyesi", DB.uzmanlik); }
            else if (step === 14) { stepDisplay("14. Güncel Yaş", DB.yas); }
            else { finish(); }
        }

        function stepDisplay(title, options) {
            document.getElementById("stepDisplay").innerText = title;
            currentOptions = options;
            drawWheel();
        }

        function spinWheel() {
            // ... (Spin mantığı aynı kalacak)
            // Sonuçları processResult() ile charData içine işle
            step++;
            initStep();
        }

        function finish() {
            document.getElementById("notebookArea").value = `KARAKTER ÖZETİ:\nKeşif Yaşı: ${charData.kesifYasi}\nUzmanlık: ${charData.uzmanlik}\nGüncel Yaş: ${charData.guncelYas}`;
        }
        
        function toggleDevPanel() { document.getElementById("devPanelContent").style.display = "flex"; }
        initStep();
    </script>
</body>
</html>
