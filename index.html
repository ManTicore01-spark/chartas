<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>RPG Karakter Motoru - Profesyonel</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        canvas { width: 300px; height: 300px; border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.5); transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1); }
        .dev-panel { margin-top: 20px; background: #222; padding: 15px; width: 300px; border-radius: 8px; }
    </style>
</head>
<body>

<h2 id="status">Hazırlanıyor...</h2>
<canvas id="wheelCanvas" width="500" height="500"></canvas>
<button onclick="spin()">ÇARKI ÇEVİR</button>

<div class="dev-panel">
    <select id="catSelect"><option value="mitolojiler">Mitoloji</option><option value="yas">Yaş</option><option value="uzmanlik">Uzmanlık</option></select>
    <input type="text" id="itemName" placeholder="İsim">
    <input type="number" id="itemWeight" placeholder="Oran (1-100)" value="10">
    <button onclick="addItem()">Ekle</button>
</div>

<script>
    let DB = JSON.parse(localStorage.getItem("rpgDB")) || {
        mitolojiler: [{name: "Yunan", weight: 50}, {name: "İskandinav", weight: 50}],
        yas: [{name: "Çocuk", weight: 30}, {name: "Genç", weight: 40}, {name: "Yaşlı", weight: 30}],
        uzmanlik: [{name: "Acemi", weight: 50}, {name: "Usta", weight: 50}]
    };

    let step = 0;
    const steps = ["mitolojiler", "yas", "uzmanlik"];
    let rotation = 0;

    // Rastgele ana renk seçici
    function getRandomColor() {
        const r = Math.floor(Math.random() * 150);
        const g = Math.floor(Math.random() * 150);
        const b = Math.floor(Math.random() * 150);
        return {r, g, b};
    }

    function draw() {
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const options = DB[steps[step]];
        const baseColor = getRandomColor();
        const totalWeight = options.reduce((sum, opt) => sum + opt.weight, 0);
        
        let startAngle = 0;

        ctx.clearRect(0, 0, 500, 500);

        options.forEach((opt, i) => {
            let sliceAngle = (opt.weight / totalWeight) * 2 * Math.PI;
            
            // Renk tonlama: Seçenek ilerledikçe açılıyor (ton + i*30)
            ctx.fillStyle = `rgb(${baseColor.r + i*40}, ${baseColor.g + i*40}, ${baseColor.b + i*40})`;
            
            ctx.beginPath();
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, startAngle, startAngle + sliceAngle);
            ctx.fill();
            ctx.stroke();

            // Metin yerleştirme
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText(opt.name, 250 + Math.cos(startAngle + sliceAngle/2) * 100, 250 + Math.sin(startAngle + sliceAngle/2) * 100);
            
            startAngle += sliceAngle;
        });
    }

    function spin() {
        rotation += 2000 + Math.random() * 1000;
        document.getElementById("wheelCanvas").style.transform = `rotate(${rotation}deg)`;
        
        setTimeout(() => {
            step++;
            if(step < steps.length) {
                document.getElementById("status").innerText = steps[step];
                draw();
            } else {
                document.getElementById("status").innerText = "Karakter Oluşturuldu!";
            }
        }, 4000);
    }

    function addItem() {
        const cat = document.getElementById("catSelect").value;
        const name = document.getElementById("itemName").value;
        const weight = parseInt(document.getElementById("itemWeight").value);
        if(name) {
            DB[cat].push({name, weight});
            localStorage.setItem("rpgDB", JSON.stringify(DB));
            draw();
        }
    }

    document.getElementById("status").innerText = steps[step];
    draw();
</script>
</body>
</html>
